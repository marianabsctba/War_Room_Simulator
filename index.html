<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRISE 02:13 — Simulador Hardcore</title>
<style>
:root {
  --bg:#06120c;
  --panel:rgba(9,22,18,.78);
  --panel2:rgba(255,255,255,.075);
  --text:#eefcf5;
  --muted:#b8cfc5;
  --accent:#39ff88;
  --danger:#ff345e;
  --warn:#ffd166;
  --line:rgba(255,255,255,.16);
  --shadow:0 24px 80px rgba(0,0,0,.45);
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
body:before{
 content:"";position:fixed;inset:0;z-index:-3;
 background:
 radial-gradient(circle at 15% 10%, rgba(57,255,136,.22), transparent 32%),
 radial-gradient(circle at 90% 12%, rgba(75,181,255,.16), transparent 30%),
 radial-gradient(circle at 50% 95%, rgba(255,52,94,.12), transparent 38%),
 linear-gradient(145deg,#03100a,#071812 44%,#13070b);
 transition:filter .8s ease, background .8s ease;
}
body:after{
 content:"";position:fixed;inset:0;z-index:-2;opacity:.28;
 background-image:
 linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
 linear-gradient(90deg,rgba(255,255,255,.035) 1px, transparent 1px);
 background-size:42px 42px;
 mask-image:linear-gradient(to bottom,transparent,black 18%,black 82%,transparent);
}
body.stage-green{--accent:#39ff88;--bg:#06120c}
body.stage-lime{--accent:#b6ff3d;--bg:#111607}
body.stage-yellow{--accent:#ffd166;--bg:#191205}
body.stage-orange{--accent:#ff8d2a;--bg:#1a0d04}
body.stage-red{--accent:#ff345e;--bg:#19050a}
.app{max-width:1440px;margin:0 auto;padding:24px}
.topbar{
 display:grid;grid-template-columns:1.2fr auto auto;gap:16px;align-items:center;
 border:1px solid var(--line);border-radius:28px;padding:18px 20px;
 background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.045));
 box-shadow:var(--shadow);backdrop-filter:blur(18px);position:sticky;top:14px;z-index:20;
}
.brand{display:flex;gap:14px;align-items:center}
.logo{
 width:52px;height:52px;border-radius:18px;display:grid;place-items:center;
 background:linear-gradient(135deg,var(--accent),rgba(255,255,255,.15));
 color:#03100a;font-weight:900;box-shadow:0 0 32px color-mix(in srgb,var(--accent),transparent 55%);
}
.brand h1{font-size:18px;margin:0;letter-spacing:.3px}
.brand p{font-size:12px;margin:4px 0 0;color:var(--muted)}
.statusPill{
 border:1px solid color-mix(in srgb,var(--accent),transparent 42%);
 border-radius:999px;padding:10px 14px;font-weight:800;color:var(--accent);
 background:color-mix(in srgb,var(--accent),transparent 88%);
 white-space:nowrap;
}
.heartBox{display:flex;align-items:center;gap:12px;justify-content:flex-end}
.heart{
 width:42px;height:42px;border-radius:50%;display:grid;place-items:center;
 background:rgba(255,255,255,.08);border:1px solid var(--line);font-size:22px;
 animation:beat 1.4s infinite ease-in-out;
}
@keyframes beat{0%,100%{transform:scale(1)}20%{transform:scale(1.18)}34%{transform:scale(.96)}48%{transform:scale(1.12)}}
.mute{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:14px;padding:11px 12px;cursor:pointer;font-weight:800}
.dashboard{display:grid;grid-template-columns:310px 1fr;gap:18px;margin-top:18px}
.sidebar{
 border:1px solid var(--line);border-radius:28px;background:var(--panel);backdrop-filter:blur(18px);
 padding:18px;box-shadow:var(--shadow);height:calc(100vh - 132px);position:sticky;top:104px;overflow:auto;
}
.metric{margin-bottom:13px}
.metricRow{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:7px}
.bar{height:9px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.fill{height:100%;width:50%;background:linear-gradient(90deg,var(--accent),#fff2);border-radius:999px;transition:width .6s ease, background .4s ease}
.timerCard{padding:16px;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.07);margin-bottom:16px}
.timer{font-size:42px;font-weight:950;letter-spacing:1px;color:var(--accent);line-height:1}
.small{font-size:12px;color:var(--muted);line-height:1.45}
.timeline{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.dot{display:flex;gap:9px;align-items:center;color:var(--muted);font-size:12px;padding:8px;border-radius:13px;border:1px solid transparent}
.dot.active{background:rgba(255,255,255,.08);border-color:color-mix(in srgb,var(--accent),transparent 52%);color:var(--text)}
.dot b{color:var(--accent)}
.stageWrap{
 overflow:hidden;border:1px solid var(--line);border-radius:30px;background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.035));
 box-shadow:var(--shadow);min-height:calc(100vh - 132px);backdrop-filter:blur(18px)
}
.scenes{display:flex;transition:transform .7s cubic-bezier(.2,.8,.2,1);height:100%}
.scene{min-width:100%;padding:26px;display:grid;grid-template-columns:1.1fr .9fr;gap:18px;align-content:start}
.card{
 border:1px solid var(--line);border-radius:26px;padding:22px;background:rgba(0,0,0,.24);
 box-shadow:0 16px 50px rgba(0,0,0,.22)
}
.sceneTitle{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:15px}
.sceneTitle h2{font-size:32px;line-height:1.05;margin:0}
.badge{font-size:12px;color:#06120c;background:var(--accent);font-weight:900;border-radius:999px;padding:8px 11px;white-space:nowrap}
.story{font-size:17px;line-height:1.62;color:#ecfff6}
.evidence{display:grid;gap:10px;margin-top:15px}
.log{
 font-family:Consolas,Monaco,monospace;font-size:13px;line-height:1.45;color:#d7fff0;
 border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.32);padding:12px;border-radius:16px;
 animation:logIn .45s ease both;
}
@keyframes logIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.question h3{margin:0 0 12px;font-size:20px}
.options{display:grid;gap:10px}
.opt{
 width:100%;text-align:left;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.07);
 color:var(--text);padding:14px 15px;border-radius:18px;cursor:pointer;font-size:14px;line-height:1.35;
 transition:.2s ease;font-weight:750; min-height:76px; display:flex; align-items:center; gap:12px;
}
.optLetter{min-width:32px;height:32px;border-radius:10px;display:grid;place-items:center;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.14);font-weight:950;color:var(--accent)}
.opt:hover{transform:translateY(-2px);border-color:var(--accent);background:rgba(255,255,255,.11)}
.opt.selected{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent),transparent 82%)}
.opt:disabled{cursor:not-allowed;opacity:.72}
.consequence{display:none;margin-top:14px;border:1px solid color-mix(in srgb,var(--accent),transparent 50%);background:color-mix(in srgb,var(--accent),transparent 90%);border-radius:18px;padding:14px;line-height:1.5}
.consequence.show{display:block}
.navBtns{display:flex;gap:10px;justify-content:space-between;margin-top:16px;flex-wrap:wrap}
.primary,.secondary{
 border:0;border-radius:16px;padding:14px 16px;font-weight:900;cursor:pointer;
}
.primary{background:linear-gradient(135deg,var(--accent),#ffffff);color:#05120c}
.secondary{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--line)}
.primary:disabled{opacity:.38;cursor:not-allowed;filter:grayscale(.5)}
.finalScreen{display:none;padding:24px}
.report{white-space:pre-wrap;line-height:1.6;color:#f4fff9}
.nameInput{width:100%;padding:15px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.09);color:var(--text);font-size:16px;margin:10px 0}
.locked{border:1px dashed rgba(255,255,255,.25);border-radius:20px;padding:16px;color:var(--muted);background:rgba(255,255,255,.05)}
canvas{display:none}
.flashBad{animation:flashBad .7s ease}
.flashGood{animation:flashGood .7s ease}
@keyframes flashBad{50%{box-shadow:0 0 0 4px rgba(255,52,94,.35)}}
@keyframes flashGood{50%{box-shadow:0 0 0 4px rgba(57,255,136,.35)}}
@media(max-width:980px){
 .app{padding:12px}
 .topbar{grid-template-columns:1fr;position:relative;top:0;border-radius:22px}
 .heartBox{justify-content:space-between}
 .dashboard{grid-template-columns:1fr}
 .sidebar{position:relative;top:0;height:auto;max-height:none;border-radius:22px}
 .scene{grid-template-columns:1fr;padding:14px}
 .sceneTitle h2{font-size:25px}
 .story{font-size:15px}
 .timer{font-size:34px}
 .stageWrap{min-height:auto;border-radius:22px}
 .card{padding:16px;border-radius:20px}
 .timeline{display:grid;grid-template-columns:repeat(2,1fr)}
}

.pdfPage{
  max-width:980px;margin:0 auto;background:#f8fbfa;color:#14251f;border-radius:22px;
  padding:34px;box-shadow:0 28px 90px rgba(0,0,0,.38);border:1px solid rgba(10,30,24,.18);
}
.pdfCover{
  border:2px solid #17382d;border-radius:20px;padding:26px;background:
  linear-gradient(135deg,rgba(57,255,136,.10),rgba(255,255,255,.92));
  margin-bottom:22px;
}
.pdfKicker{font-size:12px;text-transform:uppercase;letter-spacing:2px;color:#3c6658;font-weight:900;margin-bottom:8px}
.pdfTitle{font-family:Georgia,serif;font-size:34px;line-height:1.05;color:#102c23;margin:0 0 8px}
.pdfSub{font-size:14px;color:#4d675d;line-height:1.5;margin:0}
.resultSeal{
  display:inline-flex;align-items:center;gap:8px;margin-top:18px;border-radius:999px;padding:10px 14px;
  font-weight:950;font-size:13px;border:1px solid #17382d;background:#102c23;color:#fff;
}
.resultSeal.fail{background:#6b1428;border-color:#a51e3b}
.scoreGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0 22px}
.scoreCard{background:#fff;border:1px solid #d9e5e0;border-radius:18px;padding:14px}
.scoreCard span{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:#60786f;font-weight:900}
.scoreCard b{display:block;font-size:28px;color:#102c23;margin-top:5px}
.scoreCard.bad b{color:#9e1735}
.reportSection{background:#fff;border:1px solid #d9e5e0;border-radius:18px;padding:18px;margin:14px 0}
.reportSection h3{margin:0 0 10px;color:#102c23;font-size:18px}
.criteriaList{display:grid;gap:8px}
.criterion{display:flex;justify-content:space-between;gap:12px;border-bottom:1px dashed #d9e5e0;padding:8px 0;font-size:14px}
.criterion:last-child{border-bottom:0}
.ok{color:#0b7a46;font-weight:900}
.failTxt{color:#b2183a;font-weight:900}
.timelineReport{display:grid;gap:12px}
.timelineItem{border-left:4px solid #17382d;background:#f3f7f5;border-radius:12px;padding:12px 14px}
.timelineItem b{color:#102c23}
.timelineItem p{margin:6px 0 0;color:#415850;line-height:1.45}
.reportActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
@media(max-width:720px){
 .pdfPage{padding:18px;border-radius:18px}
 .pdfTitle{font-size:26px}
 .scoreGrid{grid-template-columns:1fr}
 .criterion{flex-direction:column;gap:3px}
}

</style>
</head>

const SALT = "MARIANA_BS_CRISIS_0213_SALT_V4_COUNTDOWN_NOISE";
function xorDecode(b64, key){
  const raw = atob(b64);
  let out = "";
  for(let i=0;i<raw.length;i++) out += String.fromCharCode(raw.charCodeAt(i) ^ key.charCodeAt(i % key.length));
  return decodeURIComponent(escape(out));
}
const scenesData = JSON.parse(xorDecode(OBF_DATA, SALT));

let current = 0;
let muted = false;
let elapsed = 0; // mantido apenas por compatibilidade visual; timer real é regressivo
let audioCtx = null;
let beatTimer = null;
let decisions = [];
let optionOrder = [];
let state = {
  tech:50, forensic:50, legal:50, continuity:50, exec:50,
  contain:40, evidence:45, ops:55, exposure:45, backup:45
};

const labels = {
  contain:"Contenção", evidence:"Evidência preservada", ops:"Impacto operacional",
  legal:"Risco jurídico", exec:"Confiança executiva", exposure:"Exposição do atacante",
  backup:"Integridade do backup", tech:"Score técnico", forensic:"Score forense", continuity:"Continuidade"
};

function clamp(n){ return Math.max(0, Math.min(100, n)); }
function seededShuffleIndexes(len, seed){
  let arr = Array.from({length:len}, (_,i)=>i);
  let x = seed || 1234567;
  function rnd(){ x = (x * 1664525 + 1013904223) >>> 0; return x / 4294967296; }
  for(let i=arr.length-1;i>0;i--){ const j = Math.floor(rnd()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function initOptionOrder(){
  const seedBase = Date.now() % 1000000;
  optionOrder = scenesData.map((s,i)=>seededShuffleIndexes(s.options.length, seedBase + i*7919));
}
function initOptionOrder(){
  const seedBase = Date.now() % 1000000;
  optionOrder = scenesData.map((s,i)=>seededShuffleIndexes(s.options.length, seedBase + i*7919));
}

function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function heartbeat(){
  if(muted) return;
  try {
    initAudio();
    const bpm = 72 + current * 9;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(58, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.18, audioCtx.currentTime + 0.015);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.11);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
    setTimeout(()=>{
      if(muted) return;
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = "sine"; osc2.frequency.setValueAtTime(44, audioCtx.currentTime);
      gain2.gain.setValueAtTime(0.001, audioCtx.currentTime);
      gain2.gain.exponentialRampToValueAtTime(0.12, audioCtx.currentTime + 0.015);
      gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.10);
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(); osc2.stop(audioCtx.currentTime + 0.12);
    }, 145);
  } catch(e) {}
}

function resetBeat(){
  clearInterval(beatTimer);
  const bpm = 72 + current * 9;
  const interval = Math.max(360, 60000 / bpm);
  document.getElementById("bpm").textContent = bpm + " BPM";
  document.getElementById("heart").style.animationDuration = (60000/bpm/1000).toFixed(2)+"s";
  beatTimer = setInterval(heartbeat, interval);
}

function updateStageColor(){
  document.body.className = "";
  const pct = current / (scenesData.length-1);
  let cls="stage-green", sev="VERDE";
  if(pct>.22){cls="stage-lime";sev="AMARELO-VERDE";}
  if(pct>.40){cls="stage-yellow";sev="AMARELO";}
  if(pct>.62){cls="stage-orange";sev="LARANJA";}
  if(pct>.82){cls="stage-red";sev="VERMELHO";}
  document.body.classList.add(cls);
  document.getElementById("severity").textContent = "SEVERIDADE: " + sev;
}

function renderMetrics(){
  const keys = ["contain","evidence","ops","legal","exec","exposure","backup","tech","forensic","continuity"];
  document.getElementById("metrics").innerHTML = keys.map(k=>{
    let val = clamp(state[k]);
    let display = k==="exposure" || k==="ops" || k==="legal" ? 100-val : val;
    return `<div class="metric">
      <div class="metricRow"><span>${labels[k]}</span><b>${Math.round(display)}%</b></div>
      <div class="bar"><div class="fill" style="width:${display}%"></div></div>
    </div>`;
  }).join("");
}

function renderTimeline(){
  document.getElementById("timeline").innerHTML = scenesData.map((s,i)=>`
    <div class="dot ${i===current?'active':''}"><b>${s.time}</b><span>${s.title}</span></div>
  `).join("");
}

function renderScenes(){
  document.getElementById("scenes").innerHTML = scenesData.map((s,idx)=>`
    <article class="scene" data-scene="${idx}">
      <div class="card">
        <div class="sceneTitle"><h2>${s.title}</h2><span class="badge">${s.time}</span></div>
        <p class="story">${s.story}</p>
        <div class="evidence">
          ${s.evidence.map((e,j)=>`<div class="log" style="animation-delay:${j*80}ms">▸ ${e}</div>`).join("")}
        </div>
      </div>
      <div class="card question">
        <h3>${s.question}</h3>
        <div class="options">
          ${optionOrder[idx].map((realIndex,j)=>{ const o=s.options[realIndex]; return `<button class="opt" data-scene="${idx}" data-opt="${realIndex}"><span class="optLetter">${String.fromCharCode(65+j)}</span><span>${o.text}</span></button>`; }).join("")}
        </div>
        <div class="consequence" id="cons-${idx}"></div>
        <div class="navBtns">
          <button class="secondary" onclick="prevScene()" ${idx===0?'disabled':''}>Voltar</button>
          <button class="primary" id="next-${idx}" onclick="nextScene()" disabled>Avançar para a próxima parte da crise →</button>
        </div>
      </div>
    </article>
  `).join("");
  document.querySelectorAll(".opt").forEach(btn=>btn.addEventListener("click", chooseOption));
}

function chooseOption(ev){
  initAudio();
  const idx = Number(ev.currentTarget.dataset.scene);
  if(idx !== current) return;
  const optIndex = Number(ev.currentTarget.dataset.opt);
  const scene = scenesData[idx];
  const opt = scene.options[optIndex];
  clearInterval(countdownInterval);
  document.querySelectorAll(`.opt[data-scene="${idx}"]`).forEach(b=>{ b.classList.remove("selected"); b.disabled = true; });
  ev.currentTarget.classList.add("selected");
  decisions[idx] = { scene: scene.title, time: scene.time, choice: opt.text, comment: opt.comment, effects: opt.effects };
  Object.keys(opt.effects).forEach(k=> state[k] = clamp(state[k] + opt.effects[k]));
  renderMetrics();
  const cons = document.getElementById("cons-"+idx);
  cons.innerHTML = "<b>Consequência registrada no War Room:</b><br>" + opt.comment;
  cons.classList.add("show");
  document.getElementById("next-"+idx).disabled = false;
  document.querySelector(".sidebar").classList.add((opt.effects.tech + opt.effects.forensic + opt.effects.legal)>5 ? "flashGood":"flashBad");
  setTimeout(()=>document.querySelector(".sidebar").classList.remove("flashGood","flashBad"),750);
}

function slide(){
  document.getElementById("scenes").style.transform = `translateX(-${current*100}%)`;
  updateStageColor(); renderTimeline(); resetBeat(); startCountdown();
}
function nextScene(){
  if(!decisions[current]) return;
  if(current < scenesData.length-1){ current++; slide(); }
  else showFinal();
}
function prevScene(){ if(current>0){ current--; slide(); } }

function finalScore(){
  const base = state.tech*.30 + state.forensic*.24 + state.continuity*.14 + state.legal*.17 + state.exec*.15;
  const riskPenalty = Math.max(0, state.exposure - 38) * .38 + Math.max(0, 42 - state.evidence) * .42 + Math.max(0, 48 - state.backup) * .50;
  const opsPenalty = Math.max(0, 42 - state.ops) * .22;
  const timeoutPenalty = decisions.filter(d=>d && d.timeout).length * 7;
  return Math.round(Math.max(0, Math.min(100, base - riskPenalty - opsPenalty - timeoutPenalty)));
}

function showFinal(){
  clearInterval(countdownInterval);
  document.getElementById("scenes").style.display="none";
  document.getElementById("finalScreen").style.display="block";
  const score = finalScore();
  const timeoutCount = decisions.filter(d=>d && d.timeout).length;
  const checks = [
    {label:"Todas as cenas concluídas", value:`${decisions.length}/${scenesData.length}`, ok: decisions.length === scenesData.length},
    {label:"Sem expiração de tempo", value: timeoutCount === 0 ? "0 expiradas" : `${timeoutCount} expirada(s)`, ok: timeoutCount === 0},
    {label:"Score final mínimo", value:`${score}/100 · mínimo 88`, ok: score >= 88},
    {label:"Score forense mínimo", value:`${Math.round(state.forensic)}/100 · mínimo 78`, ok: state.forensic >= 78},
    {label:"Score jurídico mínimo", value:`${Math.round(state.legal)}/100 · mínimo 74`, ok: state.legal >= 74},
    {label:"Evidência preservada mínima", value:`${Math.round(state.evidence)}/100 · mínimo 60`, ok: state.evidence >= 60},
    {label:"Exposição máxima do atacante", value:`${Math.round(state.exposure)}/100 · máximo 45`, ok: state.exposure <= 45},
    {label:"Integridade do backup mínima", value:`${Math.round(state.backup)}/100 · mínimo 62`, ok: state.backup >= 62}
  ];
  const passed = checks.every(c=>c.ok);
  const failed = checks.filter(c=>!c.ok);
  const statusText = passed ? "APROVADO" : "REPROVADO";
  const timeline = decisions.map((d,i)=>`
    <div class="timelineItem">
      <b>${i+1}. ${d.time} — ${d.scene}</b>
      <p><strong>Decisão:</strong> ${d.choice}</p>
      <p><strong>Análise:</strong> ${d.comment}</p>
    </div>
  `).join("");
  const reason = passed
    ? "Todos os critérios eliminatórios foram cumpridos. A condução preservou evidências, controlou exposição e manteve recuperação tecnicamente defensável."
    : "A reprovação ocorreu por critério eliminatório, mesmo com score final alto. Em crise real, uma única área crítica abaixo do mínimo pode impedir recuperação segura.";
  const failBox = failed.length ? `
    <div class="reportSection">
      <h3>Motivo exato da reprovação</h3>
      <div class="criteriaList">
        ${failed.map(f=>`<div class="criterion"><span>${f.label}</span><strong class="failTxt">${f.value}</strong></div>`).join("")}
      </div>
    </div>` : "";
  document.getElementById("report").innerHTML = `
    <div class="pdfPage">
      <div class="pdfCover">
        <div class="pdfKicker">Relatório Final da Crise · Mariana BS</div>
        <h1 class="pdfTitle">CRISE 02:13 — Simulador Hardcore de Decisão em Incidente Cibernético</h1>
        <p class="pdfSub">Relatório técnico-executivo gerado ao final da simulação, com avaliação de decisão, preservação forense, continuidade, risco jurídico e integridade de backup.</p>
        <div class="resultSeal ${passed ? "" : "fail"}">${statusText}</div>
      </div>

      <div class="scoreGrid">
        <div class="scoreCard"><span>Score Final</span><b>${score}/100</b></div>
        <div class="scoreCard"><span>Técnico</span><b>${Math.round(state.tech)}/100</b></div>
        <div class="scoreCard"><span>Forense</span><b>${Math.round(state.forensic)}/100</b></div>
        <div class="scoreCard"><span>Jurídico</span><b>${Math.round(state.legal)}/100</b></div>
        <div class="scoreCard"><span>Continuidade</span><b>${Math.round(state.continuity)}/100</b></div>
        <div class="scoreCard ${state.backup < 62 ? "bad" : ""}"><span>Integridade do Backup</span><b>${Math.round(state.backup)}/100</b></div>
      </div>

      ${failBox}

      <div class="reportSection">
        <h3>Critérios de aprovação</h3>
        <div class="criteriaList">
          ${checks.map(c=>`<div class="criterion"><span>${c.label}</span><strong class="${c.ok ? "ok" : "failTxt"}">${c.value}</strong></div>`).join("")}
        </div>
      </div>

      <div class="reportSection">
        <h3>Resumo executivo</h3>
        <p>${reason}</p>
        <p>A simulação envolveu abuso de identidade, ruído operacional, falso positivo, movimentação lateral, suspeita de exfiltração, backup sob incerteza e recuperação controlada.</p>
      </div>

      <div class="reportSection">
        <h3>Linha do tempo e decisões</h3>
        <div class="timelineReport">${timeline}</div>
      </div>

      <div class="reportSection">
        <h3>Lições aprendidas</h3>
        <p>Contenção sem evidência vira chute com dashboard. Backup só é backup depois de validação. Comunicação executiva precisa separar fato, hipótese, impacto e próxima decisão. Identidade é perímetro. Recuperação deve ocorrer por ondas, com monitoramento e critério de rollback.</p>
      </div>

      <div class="reportSection">
        <h3>Recomendações pós-incidente</h3>
        <p>Reforçar MFA administrativo, revisar privilégios, rotacionar contas de serviço por risco, validar backup periodicamente, formalizar cadeia de custódia, aprimorar detecção para AD/VPN/PowerShell e criar playbooks de comunicação executiva e regulatória.</p>
      </div>
    </div>`;
  const cert = document.getElementById("certArea");
  if(passed){
    cert.innerHTML = `<div class="pdfPage" style="margin-top:18px">
      <div class="reportSection">
        <h3>Certificado desbloqueado</h3>
        <input class="nameInput" id="studentName" placeholder="Digite o nome do participante" style="background:#fff;color:#102c23;border-color:#d9e5e0" />
        <div class="reportActions"><button class="primary" onclick="downloadCert()">Baixar certificado PNG</button></div>
      </div>
    </div>`;
  } else {
    cert.innerHTML = `<div class="pdfPage" style="margin-top:18px">
      <div class="reportSection">
        <h3>Certificado bloqueado</h3>
        <p>Corrija os critérios eliminatórios acima para desbloquear o certificado. Score alto não compensa backup fraco, evidência perdida ou tempo expirado.</p>
        <div class="reportActions"><button class="secondary" onclick="location.reload()">Reiniciar simulação</button></div>
      </div>

function makeHash(str){
  let h=2166136261;
  for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h+=(h<<1)+(h<<4)+(h<<7)+(h<<8)+(h<<24);}
  return ("00000000"+(h>>>0).toString(16)).slice(-8).toUpperCase();
}

function downloadCert(){
  const name = document.getElementById("studentName").value.trim();
  if(!name){ alert("Digite o nome do participante para emitir o certificado."); return; }
  const c = document.getElementById("certCanvas"), ctx = c.getContext("2d");
  const score = finalScore();
  const date = new Date().toLocaleDateString("pt-BR");
  const hash = makeHash(name + date + score + JSON.stringify(decisions));
  ctx.clearRect(0,0,c.width,c.height);
  const grd = ctx.createLinearGradient(0,0,1600,1100);
  grd.addColorStop(0,"#f8fff9"); grd.addColorStop(1,"#eaf3ff");
  ctx.fillStyle=grd; ctx.fillRect(0,0,1600,1100);
  ctx.strokeStyle="#17382d"; ctx.lineWidth=18; ctx.strokeRect(55,55,1490,990);
  ctx.strokeStyle="#39aa76"; ctx.lineWidth=4; ctx.strokeRect(90,90,1420,920);
  ctx.fillStyle="#12352b";
  ctx.font="bold 58px Georgia"; ctx.textAlign="center";
  ctx.fillText("Certificado de Conclusão",800,190);
  ctx.font="24px Arial"; ctx.fillStyle="#4d675d";
  ctx.fillText("Mariana BS · Simulação Técnica de Resposta a Incidente",800,235);
  ctx.font="30px Arial"; ctx.fillStyle="#1c2c28";
  ctx.fillText("Certificamos que",800,335);
  ctx.font="bold 54px Georgia"; ctx.fillStyle="#0f2b22";
  ctx.fillText(name,800,410);
  ctx.font="28px Arial"; ctx.fillStyle="#1c2c28";
  wrap(ctx,"concluiu com aprovação o simulador CRISE 02:13 — Simulador Hardcore de Decisão em Incidente Cibernético, com carga horária de 12 horas.",800,485,1120,38);
  ctx.font="bold 26px Arial"; ctx.fillStyle="#12352b";
  ctx.fillText("Competências desenvolvidas",800,620);
  ctx.font="22px Arial"; ctx.fillStyle="#344a43";
  wrap(ctx,"Resposta a Incidentes · Preservação Forense · Continuidade de Negócios · Comunicação Executiva · Análise de Logs · Gestão de Crise Cibernética · Tomada de Decisão sob Pressão",800,665,1180,34);
  ctx.font="bold 26px Arial"; ctx.fillStyle="#12352b";
  ctx.fillText("Score final: "+score+"/100",800,790);
  ctx.font="20px Arial"; ctx.fillStyle="#344a43";
  ctx.fillText("Data de emissão: "+date+"   ·   Hash do certificado: "+hash,800,845);
  ctx.font="bold 28px Georgia"; ctx.fillStyle="#12352b";
  ctx.fillText("Mariana BS",800,930);
  ctx.font="20px Arial"; ctx.fillStyle="#4d675d";
  ctx.fillText("Instrutora",800,963);
  const a=document.createElement("a");
  a.download="certificado-crise-0213-mariana-bs.png";
  a.href=c.toDataURL("image/png");
  a.click();
}
function wrap(ctx,text,x,y,maxWidth,lineHeight){
  const words=text.split(" "); let line="";
  for(let n=0;n<words.length;n++){
    let test=line+words[n]+" ";
    if(ctx.measureText(test).width>maxWidth && n>0){ctx.fillText(line,x,y);line=words[n]+" ";y+=lineHeight;}
    else line=test;
  }
  ctx.fillText(line,x,y);
}

document.getElementById("muteBtn").onclick = () => {
  muted = !muted;
  document.getElementById("muteBtn").textContent = muted ? "Som ligado" : "Mutar";
};
let countdown = 60;
let countdownInterval = null;
function sceneLimit(){
  return Math.max(28, 60 - current * 3);
}
function startCountdown(){
  clearInterval(countdownInterval);
  countdown = sceneLimit();
  updateCountdownUI();
  countdownInterval = setInterval(()=>{
    if(decisions[current]) return;
    countdown--;
    updateCountdownUI();
    if(countdown <= 0){
      clearInterval(countdownInterval);
      timeoutDecision();
    }
  }, 1000);
}
function updateCountdownUI(){
  const el = document.getElementById("timer");
  const m = String(Math.floor(countdown/60)).padStart(2,"0");
  const s = String(countdown%60).padStart(2,"0");
  el.textContent = m + ":" + s;
  const ratio = countdown / sceneLimit();
  if(ratio < .25){ el.style.color = "var(--danger)"; }
  else if(ratio < .5){ el.style.color = "var(--warn)"; }
  else { el.style.color = "var(--accent)"; }
  const bpm = Math.round(72 + current * 8 + (1-ratio) * 42);
  document.getElementById("bpm").textContent = bpm + " BPM";
  document.getElementById("heart").style.animationDuration = Math.max(.42, 60000/bpm/1000).toFixed(2)+"s";
}
function timeoutDecision(){
  const idx = current;
  if(decisions[idx]) return;
  const scene = scenesData[idx];
  const timeoutChoice = {
    text: "Sem decisão registrada dentro do tempo.",
    effects: {tech:-10, forensic:-8, legal:-6, continuity:-8, exec:-10, contain:-9, evidence:-8, ops:-6, exposure:10, backup:-2},
    comment: "O tempo expirou. Em crise real, não decidir também é uma decisão — normalmente uma bem cara."
  };
  decisions[idx] = {scene: scene.title, time: scene.time, choice: timeoutChoice.text, comment: timeoutChoice.comment, effects: timeoutChoice.effects, timeout:true};
  Object.keys(timeoutChoice.effects).forEach(k=> state[k] = clamp(state[k] + timeoutChoice.effects[k]));
  renderMetrics();
  const cons = document.getElementById("cons-"+idx);
  cons.innerHTML = "<b>Tempo expirado:</b><br>" + timeoutChoice.comment;
  cons.classList.add("show");
  document.querySelectorAll(`.opt[data-scene="${idx}"]`).forEach(b=>b.disabled=true);
  document.getElementById("next-"+idx).disabled = false;
  document.querySelector(".sidebar").classList.add("flashBad");
  setTimeout(()=>document.querySelector(".sidebar").classList.remove("flashBad"),750);
}

initOptionOrder(); initOptionOrder(); renderScenes(); renderMetrics(); renderTimeline(); updateStageColor(); resetBeat(); startCountdown(); startCountdown();
document.addEventListener("click", initAudio, {once:true});
</script>
